name: Kojo CI

on:
  push:
    branches:
      - main
      - "feature/**"
      - "fix/**"
      - "chore/**"
      - "docs/**"
      - "ci/**"
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: kojo
    container:
      image: nikolaik/python-nodejs:python3.12-nodejs24

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install deps
        run: |
          pip install -r requirements.txt

      - name: Compileall
        run: python -m compileall . -q -x '/(\.git|__pycache__|cache|deploy|\.venv)/'

      - name: Pytest
        run: python -m pytest -q --tb=short 2>&1

      - name: mypy
        run: python -m mypy tg_bot services --show-error-codes

      - name: ruff
        run: python -m ruff check tg_bot/ services/ utils/
