name: Kojo CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compileall
        run: python -m compileall tg_bot services utils alembic tests -q

      - name: Pytest
        continue-on-error: true
        run: python -m pytest -q --tb=line

      - name: Mypy
        continue-on-error: true
        run: python -m mypy tg_bot services --no-error-summary

      - name: Ruff
        continue-on-error: true
        run: python -m ruff check .

  docker:
    runs-on: ubuntu-latest
    needs: test
    if: always()
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker build
        run: docker build -t kojo-bot-service:ci -f docker/Dockerfile .
