name: Kojo CI

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Diag — python version
        run: python --version

      - name: Diag — pip list
        run: pip list 2>&1

      - name: Diag — import pytest
        run: python -c "import pytest; print('pytest:', pytest.__version__)"

      - name: Diag — import mypy
        run: python -c "import mypy; print('mypy:', mypy.__version__)"

      - name: Diag — import ruff
        run: python -c "import ruff; print('ruff:', ruff.__version__)"

      - name: Diag — sys.path
        run: python -c "import sys; [print(p) for p in sys.path]"

      - name: Diag — import tg_bot
        continue-on-error: true
        run: python -c "import tg_bot; print('tg_bot:', tg_bot.__file__)"

      - name: Diag — import services
        continue-on-error: true
        run: python -c "import services; print('services:', services.__file__)"

      - name: Compileall
        run: python -m compileall . -q -x '/(\.git|__pycache__|cache|deploy|\.venv)/'

      - name: Pytest collect
        continue-on-error: true
        run: python -m pytest --collect-only -q 2>&1

      - name: Pytest run
        continue-on-error: true
        run: python -m pytest -vv --tb=long 2>&1

      - name: Mypy run
        continue-on-error: true
        run: python -m mypy tg_bot services --show-error-codes 2>&1

      - name: Ruff run
        continue-on-error: true
        run: python -m ruff check . 2>&1
